<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0}iframe{border:0;display:block}</style></head><body>
<iframe id="f" src="./Renee-Leon-family-tree.html" style="width:390px;height:844px"></iframe>
<script>
var f=document.getElementById('f'),ACT=new URLSearchParams(location.search).get('act')||'';
(function go(){
  var d=f.contentDocument,ped=d.getElementById('ped');
  if(!ped||!ped.innerHTML.trim())return setTimeout(go,100);
  setTimeout(function(){
    if(ACT==='search'){var q=d.getElementById('q');q.value='oostende';q.dispatchEvent(new Event('input',{bubbles:true}));}
    if(ACT==='panel'){d.getElementById('lineBtn').click();}
    if(ACT==='index'){d.querySelectorAll('.tab')[2].click();}
    if(ACT==='lineages'){d.querySelectorAll('.tab')[1].click();}
  },300);
})();
</script></body></html>
