<!DOCTYPE html><html><body style="margin:0">
<iframe id="f" src="./__mt.html" style="width:390px;height:844px;border:0"></iframe>
<script>
var f=document.getElementById('f');
(function go(){
  var d=f.contentDocument,w=f.contentWindow,ped=d.getElementById('ped');
  if(!ped||!ped.innerHTML.trim())return setTimeout(go,100);
  setTimeout(function(){
    var r=[];
    r.push('tip="'+d.getElementById('tip').textContent+'"');
    // simulate a tap on a node: mouseover with no mouseout, as a touch device sends
    var node=d.querySelector('.node[data-id]');
    node.dispatchEvent(new w.MouseEvent('mouseover',{bubbles:true}));
    r.push('tooltipDisplayAfterTap="'+(d.getElementById('tt').style.display||'(none)')+'"');
    r.push('tooltipHTMLEmpty='+(d.getElementById('tt').innerHTML===''));
    document.title='T::'+r.join(' || ');
  },300);
})();
</script></body></html>
