<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#777;font:12px system-ui}
iframe{border:0;display:block}
</style></head><body>
<iframe id="f" src="./Renee-Leon-family-tree.html" style="width:390px;height:844px"></iframe>
<script>
var f=document.getElementById('f'), ACT=new URLSearchParams(location.search).get('act')||'';
function go(){
  var d=f.contentDocument, w=f.contentWindow, ped=d.getElementById('ped');
  if(!ped||!ped.innerHTML.trim()) return setTimeout(go,100);
  setTimeout(function(){
    if(ACT==='search'){var q=d.getElementById('q');q.value='oostende';q.dispatchEvent(new Event('input',{bubbles:true}));}
    if(ACT==='panel'){d.getElementById('lineBtn').click();}
    if(ACT==='index'){d.querySelectorAll('.tab')[2].click();}
    setTimeout(report,300);
  },300);
}
function report(){
  var d=f.contentDocument,w=f.contentWindow,de=d.documentElement,r=['vw='+de.clientWidth,'scrollW='+de.scrollWidth];
  var fixed=[].slice.call(d.querySelectorAll('body *')).filter(function(el){return w.getComputedStyle(el).position==='fixed';});
  d.querySelectorAll('body *').forEach(function(el){
    if(fixed.some(function(fx){return fx===el||fx.contains(el);})) return;
    if(el.closest('.ped')) return; // scrolls inside itself by design
    var b=el.getBoundingClientRect();
    if(b.width>0&&b.right>de.clientWidth+1) r.push('OVF '+el.tagName+'.'+el.className+' r='+Math.round(b.right));
  });
  r.push('inputFont='+w.getComputedStyle(d.getElementById('q')).fontSize);
  var lb=d.getElementById('lineBtn').getBoundingClientRect();
  r.push('lineBtn='+Math.round(lb.width)+'x'+Math.round(lb.height));
  r.push('pedScrollLeft='+Math.round(d.getElementById('ped').scrollLeft));
  r.push('pedScrollW='+d.getElementById('ped').scrollWidth);
  r.push('tip="'+d.getElementById('tip').textContent.slice(0,40)+'"');
  document.title='M::'+r.join(' || ');
}
go();
</script></body></html>
